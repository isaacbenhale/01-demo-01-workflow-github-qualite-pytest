name: CI - Qualité Python

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    name: Tests et qualité du code
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérifier la qualité du code avec Ruff
        run: |
          ruff check app tests

      - name: Exécuter les tests avec Pytest
        run: |
          pytest

      - name: Exécuter les tests avec couverture
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=html

      - name: Sauvegarder le rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: rapport-couverture
          path: htmlcov/
